name: org.apache.kie.sonataflow.operatorBuilder
version: "1.0"
description: Builds the operator binary

artifacts:
  - name: main
    path: "../../../../cmd/main.go"
    target: "main.go"
    dest: /workspace/cmd

  - name: controllers
    path: "../../../../internal/controller"
    dest: /workspace/internal/controller

  - name: version
    path: "../../../../version"
    dest: /workspace/version

  - name: utils
    path: "../../../../utils"
    dest: /workspace/utils

  - name: log
    path: "../../../../log"
    dest: /workspace/log

execute:
  - script: install.sh